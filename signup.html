<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dev.folio | Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;600&family=Syne:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg);
            padding: 2rem;
        }

        .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            padding: 3rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-logo {
            width: 60px;
            margin-bottom: 1.5rem;
        }

        .auth-title {
            font-family: 'Syne', sans-serif;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .auth-subtitle {
            color: var(--text2);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.6rem;
            font-size: 0.9rem;
            color: var(--text2);
        }

        .form-input {
            width: 100%;
            padding: 0.85rem 1.25rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: inherit;
            transition: all 0.3s;
        }

        .form-input:focus {
            border-color: var(--accent);
            outline: none;
            background: rgba(255, 255, 255, 0.05);
        }

        .auth-btn {
            width: 100%;
            padding: 1rem;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            font-family: inherit;
            margin-top: 1rem;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--text2);
        }

        .auth-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .alert {
            padding: 1rem;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            display: none;
            text-align: center;
        }

        .alert-error {
            background: rgba(255, 59, 48, 0.1);
            color: #ff3b30;
            border: 1px solid rgba(255, 59, 48, 0.2);
        }

        .alert-success {
            background: rgba(0, 212, 200, 0.1);
            color: var(--accent);
            border: 1px solid rgba(0, 212, 200, 0.2);
        }
    </style>
</head>

<body>

    <div class="auth-card">
        <div class="auth-header">
            <img src="images/logo/Logo-1.png" alt="Logo" class="auth-logo">
            <h1 class="auth-title">Create account</h1>
            <p class="auth-subtitle">Get started with your Gmail address</p>
        </div>

        <div id="alert" class="alert"></div>

        <form id="signupForm">
            <div class="form-group">
                <label class="form-label">Gmail Address</label>
                <input type="email" id="email" class="form-input" placeholder="example@gmail.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Create Password</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required>
            </div>

            <button type="submit" class="auth-btn">Sign up</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Sign in</a>
        </div>
    </div>

    <script src="assets/js/auth.js"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alert = document.getElementById('alert');

            const result = AuthManager.signup(email, password);
            if (result.success) {
                alert.className = 'alert alert-success';
                alert.textContent = result.message + ' Redirecting...';
                alert.style.display = 'block';
                setTimeout(() => window.location.href = 'login.html', 2000);
            } else {
                alert.className = 'alert alert-error';
                alert.textContent = result.message;
                alert.style.display = 'block';
            }
        });
    </script>
</body>

</html>
