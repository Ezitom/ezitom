<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — dev.folio Admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/x-icon" href="../../assets/favicon/favicon.ico" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <div class="login-logo">dev.folio</div>
    <div class="login-subtitle">Reset Your Password</div>

    <div id="alert" class="alert" style="display:none;"></div>

    <form id="forgotForm" novalidate>
      <p style="color:var(--text-muted);font-size:0.9rem;margin-bottom:1.2rem;line-height:1.5;">
        Enter your admin email address and we'll send you a link to reset your password.
      </p>
      <div class="form-group">
        <label class="form-label" for="email">Gmail Address</label>
        <input type="email" id="email" class="form-control" placeholder="admin@gmail.com" required autocomplete="email" />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;" id="submitBtn">
        <i class="fas fa-paper-plane"></i> Send Reset Link
      </button>
    </form>

    <a class="forgot-link" href="../login/" style="display:block;text-align:center;margin-top:1.2rem;">
      <i class="fas fa-arrow-left" style="margin-right:4px;"></i> Back to Login
    </a>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/supabaseClient.js"></script>
<script>
  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = 'alert ' + (type === 'success' ? 'alert-success' : 'alert-error') + ' show';
    el.style.display = '';
  }

  // Build the correct reset-password redirect URL for this environment
  function getResetRedirectUrl() {
    const href = window.location.href;
    if (href.includes('/client/admin/')) {
      // Local dev
      return window.location.origin + window.location.pathname.replace('forgot.html', 'reset-password.html');
    }
    // Production (GitHub Pages)
    const isGhPages = window.location.pathname.includes('/ezitom/');
    return isGhPages
      ? 'https://ezitom.github.io/ezitom/admin/reset-password/'
      : window.location.origin + '/admin/reset-password/';
  }

  document.getElementById('forgotForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const btn   = document.getElementById('submitBtn');

    if (!email) {
      showAlert('Please enter your email address.', 'error');
      return;
    }

    if (!window.supabaseClient) {
      showAlert('Auth service not ready. Please refresh and try again.', 'error');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending…';

    const { error } = await window.supabaseClient.auth.resetPasswordForEmail(email, {
      redirectTo: getResetRedirectUrl()
    });

    if (error) {
      showAlert('Failed to send reset email: ' + error.message, 'error');
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link';
      return;
    }

    showAlert('Password reset link sent! Check your Gmail inbox (and spam folder).', 'success');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-check"></i> Email Sent';
  });
</script>
</body>
</html>
