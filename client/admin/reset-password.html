<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — dev.folio Admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/x-icon" href="/assets/favicon/favicon.ico" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <div class="login-logo">dev.folio</div>
    <div class="login-subtitle">Set New Password</div>

    <div id="alert" class="alert"></div>

    <!-- Reset form -->
    <div id="formSection" style="display:none;">
      <p style="font-size:0.875rem; color:var(--text-muted); margin-bottom:1.5rem;">
        Choose a strong new password for your admin account.
      </p>
      <form id="resetForm">
        <div class="form-group">
          <label class="form-label" for="newPwd">New Password</label>
          <div style="position:relative;">
            <input type="password" id="newPwd" class="form-control"
              placeholder="Min 8 characters" required minlength="8"
              style="padding-right:2.8rem;" />
            <button type="button" id="toggleNew"
              style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirmPwd">Confirm Password</label>
          <div style="position:relative;">
            <input type="password" id="confirmPwd" class="form-control"
              placeholder="Re-enter new password" required minlength="8"
              style="padding-right:2.8rem;" />
            <button type="button" id="toggleConfirm"
              style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-success" style="width:100%;" id="submitBtn">
          <i class="fas fa-shield-alt"></i> Save New Password
        </button>
      </form>
    </div>

    <a class="forgot-link" href="login.html">
      <i class="fas fa-arrow-left"></i> Back to Login
    </a>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/crypto.js"></script>
<script>
  const alertEl = document.getElementById('alert');
  const formSection = document.getElementById('formSection');

  function showAlert(msg, type = 'error') {
    alertEl.textContent = msg;
    alertEl.className = `alert alert-${type} show`;
    window.scrollTo(0, 0);
  }
  function hideAlert() { alertEl.className = 'alert'; }

  // Extract reset parameters from URL
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');
  const expiry = urlParams.get('expiry');
  const sig = urlParams.get('sig');

  // Verify URL parameters and token signature
  async function validateResetLink() {
    if (!token || !expiry || !sig) {
      showAlert('Invalid password reset link. Please request a new one from the forgot password page.');
      return;
    }

    if (Date.now() > parseInt(expiry)) {
      showAlert('This password reset link has expired. Please request a new one.');
      return;
    }

    try {
      const expectedSig = await getSignature(token, expiry, ADMIN_PASSWORD);
      if (sig !== expectedSig) {
        showAlert('Invalid password reset link signature or authorization token.');
        return;
      }

      // If valid, show the form
      formSection.style.display = 'block';
    } catch (e) {
      console.error(e);
      showAlert('Error verifying reset token: ' + e.message);
    }
  }

  validateResetLink();

  // ── Password visibility toggles ───────────────────────────────────────────
  function setupToggle(toggleId, inputId) {
    document.getElementById(toggleId).addEventListener('click', function () {
      const input = document.getElementById(inputId);
      const icon  = this.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    });
  }
  setupToggle('toggleNew',     'newPwd');
  setupToggle('toggleConfirm', 'confirmPwd');

  // ── Form submission: Commit new password to GitHub ────────────────────────
  document.getElementById('resetForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    hideAlert();

    const newPwd = document.getElementById('newPwd').value;
    const confirmPwd = document.getElementById('confirmPwd').value;

    if (newPwd !== confirmPwd) {
      showAlert('Passwords do not match. Please try again.');
      return;
    }
    if (newPwd.length < 8) {
      showAlert('Password must be at least 8 characters.');
      return;
    }

    const submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating repository...';

    // Retrieve GitHub Token (either injected at build time, or prompt user)
    let githubToken = 'import.meta.env.VITE_GITHUB_TOKEN';
    if (!githubToken || githubToken.includes('import.meta') || githubToken === 'undefined') {
      githubToken = localStorage.getItem('github_token') || '';
    }

    if (!githubToken) {
      const userToken = prompt("GitHub Token is not configured. Please enter your GitHub Personal Access Token (PAT) with write access to your repository to push the new password:");
      if (!userToken) {
        showAlert("GitHub Token is required to commit the new password back to the repository.");
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-shield-alt"></i> Save New Password';
        return;
      }
      githubToken = userToken;
      localStorage.setItem('github_token', userToken);
    }

    try {
      // Step 1: Fetch the existing file to get the SHA hash
      const fileUrl = 'https://api.github.com/repos/ezitom/ezitom/contents/src/config/adminConfig.js';
      const getResponse = await fetch(fileUrl, {
        headers: {
          'Authorization': `token ${githubToken}`,
          'Accept': 'application/vnd.github.v3+json'
        }
      });

      if (!getResponse.ok) {
        throw new Error(`Failed to fetch adminConfig.js metadata from GitHub (Status ${getResponse.status}). Verify your token permissions.`);
      }

      const fileData = await getResponse.json();
      const sha = fileData.sha;

      // Step 2: Prepare new file content
      const newFileContent = `// Admin credentials — update these directly here to change your login details
// After updating run npm run deploy to push the changes live
export const ADMIN_CREDENTIALS = {
  email: '${ADMIN_EMAIL}',
  password: '${newPwd}'
};
`;

      // UTF-8 safe base64 encoding
      const base64Content = btoa(unescape(encodeURIComponent(newFileContent)));

      // Step 3: PUT request to commit changes
      const putResponse = await fetch(fileUrl, {
        method: 'PUT',
        headers: {
          'Authorization': `token ${githubToken}`,
          'Content-Type': 'application/json',
          'Accept': 'application/vnd.github.v3+json'
        },
        body: JSON.stringify({
          message: 'fix: update admin password via secure forgot-password flow',
          content: base64Content,
          sha: sha,
          branch: 'main'
        })
      });

      if (!putResponse.ok) {
        const errorData = await putResponse.json();
        throw new Error(errorData.message || 'Failed to push commit to GitHub.');
      }

      // Fallback for instant local / in-session testing without waiting for build redeploy
      localStorage.setItem('admin_custom_password', newPwd);

      // Redirect to login with success query parameter
      window.location.href = 'login.html?reset=success';

    } catch (error) {
      console.error('GitHub API error:', error);
      showAlert(`Failed to update password on GitHub: ${error.message}. Please verify your GitHub PAT token.`);
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<i class="fas fa-shield-alt"></i> Save New Password';
    }
  });
</script>
</body>
</html>
