<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — dev.folio Admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/x-icon" href="/assets/favicon/favicon.ico" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <div class="login-logo">dev.folio</div>
    <div class="login-subtitle">Reset Password</div>

    <div id="alert" class="alert"></div>

    <!-- Enter Gmail to verify identity -->
    <div id="step1">
      <p style="font-size:0.875rem;color:var(--text-muted);margin-bottom:1.5rem;">
        Enter your admin Gmail address to verify your identity. If it matches, we'll send a password reset link to your inbox.
      </p>
      <form id="forgotForm">
        <div class="form-group">
          <label class="form-label" for="adminEmail">Admin Gmail Address</label>
          <input type="email" id="adminEmail" class="form-control" placeholder="admin@gmail.com" required />
        </div>
        <button type="submit" id="sendBtn" class="btn btn-primary" style="width:100%;">
          <i class="fas fa-shield-alt"></i> Send Reset Link
        </button>
      </form>
    </div>

    <a class="forgot-link" href="login.html">
      <i class="fas fa-arrow-left"></i> Back to Login
    </a>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/crypto.js"></script>
<script>
  const alertEl = document.getElementById('alert');
  function showAlert(msg, type = 'error') {
    alertEl.textContent = msg;
    alertEl.className = `alert alert-${type} show`;
  }
  function hideAlert() { alertEl.className = 'alert'; }

  document.getElementById('forgotForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    hideAlert();

    const enteredEmail = document.getElementById('adminEmail').value.trim();
    const adminEmail   = (typeof ADMIN_EMAIL !== 'undefined' ? ADMIN_EMAIL : '').trim();

    if (enteredEmail.toLowerCase() !== adminEmail.toLowerCase()) {
      showAlert('No admin account found with that Gmail address.');
      return;
    }

    const sendBtn = document.getElementById('sendBtn');
    sendBtn.disabled = true;
    sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending Link...';

    try {
      // Generate secure stateless reset signature
      const token = window.crypto.randomUUID ? window.crypto.randomUUID() : Math.random().toString(36).substring(2) + Math.random().toString(36).substring(2);
      const expiry = Date.now() + 15 * 60 * 1000; // 15 minutes validity
      const sig = await getSignature(token, expiry, ADMIN_PASSWORD);

      // Determine reset URL dynamically to support local dev, preview, and production
      const currentUrl = window.location.href;
      let resetUrl = '';
      if (currentUrl.includes('/client/admin/')) {
        // Local Live Server / static files
        resetUrl = currentUrl.replace('forgot.html', 'reset-password.html') + `?token=${token}&expiry=${expiry}&sig=${sig}`;
      } else {
        // Production cleaner URLs
        const isGithubPages = window.location.pathname.includes('/ezitom/');
        const base = isGithubPages ? '/ezitom' : '';
        resetUrl = `${window.location.origin}${base}/admin/reset-password/?token=${token}&expiry=${expiry}&sig=${sig}`;
      }

      // Send the reset link to admin Gmail using Web3Forms
      const payload = {
        access_key: 'c2aafe30-5e26-4628-a968-a33d4c9216de',
        name: 'dev.folio Admin System',
        email: enteredEmail,
        subject: 'Admin Password Reset Request - dev.folio',
        message: `Hello,\n\nYou requested to reset your admin password for dev.folio. Click the link below to set a new password:\n\n${resetUrl}\n\nThis link is valid for 15 minutes.\n\nIf you did not request this, please ignore this email.\n\nBest regards,\ndev.folio Admin`,
        from_name: 'dev.folio Admin System',
        replyto: enteredEmail
      };

      const response = await fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify(payload)
      });

      const result = await response.json();
      if (result.success) {
        showAlert('Reset link has been sent to your Gmail address! Please check your inbox.', 'success');
      } else {
        throw new Error(result.message || 'Web3Forms submission failed');
      }
    } catch (error) {
      console.error('Failed to send reset email:', error);
      showAlert(`Failed to send email: ${error.message || error}`);
    } finally {
      sendBtn.disabled = false;
      sendBtn.innerHTML = '<i class="fas fa-shield-alt"></i> Send Reset Link';
    }
  });
</script>
</body>
</html>
